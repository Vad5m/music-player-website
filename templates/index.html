<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>None</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        :root {
            --neon-red: #ff001c;
            --neon-glow: rgba(255, 0, 28, 0.8);
            --neon-dim: rgba(255, 0, 28, 0.2);
            --neon-border: rgba(255, 0, 28, 0.4);
            --neon-border-light: rgba(255, 0, 28, 0.3);
            --visualizer-opacity: 0.3;
            --effects-opacity: 0.5;
            --effects-color: #ff001c;
            --text-main: #ffffff;
            --text-muted: #c0b0b5;
            --bg-dark: #0b0b0b;
        }
        body {
            background: #000000;
            min-height: 100vh;
            width: 100%;
            overflow: hidden;
            font-family: "Segoe UI", "Inter", system-ui, sans-serif;
        }
        .widget-wrapper {
            position: fixed;
            z-index: 9998;
            cursor: default;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform, left, top;
            transition: none;
        }
        .widget-wrapper .edit-frame {
            display: none;
            position: absolute;
            top: -10px;
            left: -10px;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 16px;
            pointer-events: none;
            z-index: 50;
        }
        .widget-wrapper .edit-frame .edit-controls {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.9);
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: all;
            white-space: nowrap;
            z-index: 100;
        }
        .widget-wrapper .edit-frame .edit-controls img {
            width: 16px;
            height: 16px;
            filter: brightness(0) invert(1) opacity(0.7);
            cursor: pointer;
            transition: 0.2s;
            display: block;
            pointer-events: all;
            flex-shrink: 0;
        }
        .widget-wrapper .edit-frame .edit-controls img:hover {
            filter: brightness(0) invert(1) opacity(1);
            transform: scale(1.1);
        }
        .widget-wrapper.edit-mode .edit-frame { display: block !important; }
        .widget-wrapper.edit-mode { pointer-events: all !important; }

        #settings-top-btn {
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            z-index: 9999;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid var(--neon-border);
            border-radius: 12px;
            cursor: pointer;
            padding: 0;
            overflow: visible;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            transition: box-shadow 0.3s, border-color 0.3s, background 0.3s;
        }
        #settings-top-btn:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 20px var(--neon-glow);
            background: rgba(20,0,0,0.8);
        }
        #settings-top-btn .btn-icon {
            width: 28px;
            height: 28px;
            filter: brightness(0) invert(1) drop-shadow(0 0 4px var(--neon-glow));
            transition: 0.3s;
            display: block;
            pointer-events: none;
            flex-shrink: 0;
        }
        #settings-top-btn:hover .btn-icon {
            filter: brightness(0) invert(1) drop-shadow(0 0 8px var(--neon-red));
        }

        #player-widget {
            top: 100px;
            left: 20px;
            width: auto;
            height: auto;
            padding: 0;
            gap: 6px;
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            pointer-events: all;
        }
        #player-widget .player-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #player-widget .player-btn:hover {
            background: var(--neon-dim);
            border-color: var(--neon-red);
            box-shadow: 0 0 24px var(--neon-glow), 0 0 20px rgba(0,0,0,0.8);
            transform: scale(1.08);
        }
        #player-widget .player-btn:active { transform: scale(0.92); }
        #player-widget .player-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.1));
        }

        .custom-play-container {
            --color: #ffffff;
            --size: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            font-size: var(--size);
            user-select: none;
            fill: var(--color);
            width: var(--size);
            height: var(--size);
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transition: 0.2s;
            flex-shrink: 0;
        }
        .custom-play-container:hover {
            background: var(--neon-dim);
            border-color: var(--neon-red);
            box-shadow: 0 0 24px var(--neon-glow), 0 0 20px rgba(0,0,0,0.8);
            transform: scale(1.08);
        }
        .custom-play-container:active { transform: scale(0.92); }
        .custom-play-container .play {
            position: absolute;
            animation: keyframes-fill .5s;
            width: 20px;
            height: 20px;
        }
        .custom-play-container .pause {
            position: absolute;
            display: none;
            animation: keyframes-fill .5s;
            width: 20px;
            height: 20px;
        }
        .custom-play-container.playing .play { display: none; }
        .custom-play-container.playing .pause { display: block; }
        @keyframes keyframes-fill {
            0% { transform: rotate(-180deg) scale(0); opacity: 0; }
            50% { transform: rotate(-10deg) scale(1.2); }
        }

        .custom-vol-container {
            --color: #ffffff;
            --size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            font-size: var(--size);
            user-select: none;
            fill: var(--color);
            width: var(--size);
            height: var(--size);
            flex-shrink: 0;
        }
        .custom-vol-container .mute {
            position: absolute;
            animation: keyframes-fill .5s;
            width: 20px;
            height: 20px;
        }
        .custom-vol-container .voice {
            position: absolute;
            display: none;
            animation: keyframes-fill .5s;
            width: 20px;
            height: 20px;
        }
        .custom-vol-container.muted .mute { display: none; }
        .custom-vol-container.muted .voice { display: block; }

        #info-widget {
            top: 40px;
            left: 100px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            border: none;
            border-radius: 16px;
            padding: 12px 24px;
            min-width: 180px;
            color: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            z-index: 9997;
            pointer-events: none;
        }
        #info-widget .track-title {
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            white-space: nowrap;
            font-size: 20px;
        }
        #info-widget .artist-name {
            color: var(--neon-red);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.9;
            font-size: 13px;
        }

        #progress-widget {
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9997;
            min-width: 260px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            pointer-events: all;
            height: 44px;
        }
        #progress-widget .time-label {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            min-width: 50px;
            font-variant-numeric: tabular-nums;
            font-size: 16px;
            flex-shrink: 0;
        }
        #progress-widget .progress-track {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            min-width: 80px;
        }
        #progress-widget .progress-fill {
            height: 100%;
            background: var(--neon-red);
            box-shadow: 0 0 8px var(--neon-red);
            border-radius: 4px;
            width: 0%;
            position: relative;
        }
        #progress-widget .progress-pointer {
            position: absolute;
            right: -5px;
            top: -5px;
            width: 12px;
            height: 12px;
            background: var(--neon-red);
            transform: rotate(45deg);
            border-radius: 2px;
            box-shadow: 0 0 12px var(--neon-red);
        }

        #volume-widget {
            bottom: 60px;
            right: 30px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9997;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            pointer-events: all;
            height: 44px;
        }
        #volume-widget .vol-slider {
            flex: 1;
            min-width: 60px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            cursor: pointer;
        }
        #volume-widget .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--neon-red);
            transform: rotate(45deg);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--neon-red);
            cursor: pointer;
        }
        #volume-widget .vol-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--neon-red);
            transform: rotate(45deg);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--neon-red);
            cursor: pointer;
            border: none;
        }

        #playlist-widget {
            top: 120px;
            right: 30px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(16px);
            border: none;
            border-radius: 20px;
            padding: 14px 16px 16px 16px;
            z-index: 9995;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            pointer-events: all;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            transition: opacity 0.3s, transform 0.3s;
            width: 280px;
            height: 340px;
        }
        #playlist-widget.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none !important;
        }
        #playlist-widget.edit-mode { overflow: visible !important; }
        #playlist-widget .pl-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1.5px;
            font-weight: 600;
            text-transform: uppercase;
            flex-shrink: 0;
            font-size: 9px;
        }
        #playlist-widget .pl-search {
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--neon-border-light);
            border-radius: 30px;
            padding: 3px 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #playlist-widget .pl-search input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 11px;
            width: 80px;
        }
        #playlist-widget .pl-search input::placeholder { color: rgba(255,255,255,0.3); }
        #playlist-widget .pl-search i {
            color: var(--neon-red);
            font-size: 11px;
        }
        #playlist-widget .pl-list {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-right: 4px;
        }
        #playlist-widget .pl-list::-webkit-scrollbar { width: 2px; }
        #playlist-widget .pl-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        #playlist-widget .pl-list::-webkit-scrollbar-thumb {
            background: var(--neon-red);
            border-radius: 4px;
            box-shadow: 0 0 6px var(--neon-glow);
        }
        #playlist-widget .pl-list { scrollbar-width: thin; scrollbar-color: var(--neon-red) rgba(255,255,255,0.05); }
        .pl-item {
            display: grid;
            grid-template-columns: 24px 1fr 28px;
            align-items: center;
            padding: 4px 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.1s;
            background: rgba(0,0,0,0.3);
            color: #ddd;
            font-size: 12px;
        }
        .pl-item:hover { background: var(--neon-dim); }
        .pl-item.active-song {
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--neon-red);
            box-shadow: 0 0 6px var(--neon-glow);
        }
        .pl-item .pl-num {
            color: rgba(255,255,255,0.3);
            font-size: 10px;
        }
        .pl-item .pl-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
        }
        .pl-item .pl-dl {
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            background: none;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .pl-item .pl-dl:hover {
            color: var(--neon-red);
            background: var(--neon-dim);
            text-shadow: 0 0 6px var(--neon-glow);
        }

        #settings-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            bottom: 20px;
            width: 400px;
            max-width: calc(100vw - 40px);
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            border: 1px solid var(--neon-border);
            border-radius: 24px;
            z-index: 10000;
            transform: scale(0.95) translateY(10px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
            padding: 30px 24px;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #settings-panel.open {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: all;
        }
        #settings-panel::-webkit-scrollbar { width: 4px; }
        #settings-panel::-webkit-scrollbar-track { background: transparent; }
        #settings-panel::-webkit-scrollbar-thumb {
            background: var(--neon-red);
            border-radius: 4px;
        }
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--neon-border-light);
            flex-shrink: 0;
        }
        .settings-header h2 {
            color: white;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .settings-close-btn {
            width: 36px;
            height: 36px;
            background: var(--neon-dim);
            border: 1px solid var(--neon-border);
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            flex-shrink: 0;
            font-family: Arial, sans-serif;
            font-weight: 300;
            line-height: 1;
        }
        .settings-close-btn:hover {
            background: var(--neon-red);
            transform: rotate(90deg);
        }
        .settings-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .settings-main {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: 0.3s;
        }
        .setting-item:hover {
            border-color: var(--neon-border-light);
            background: rgba(255,255,255,0.06);
        }
        .setting-item .label {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 500;
        }
        .setting-item .setting-input {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--neon-border-light);
            border-radius: 8px;
            padding: 6px 12px;
            color: white;
            font-size: 14px;
            outline: none;
            width: 160px;
            transition: 0.3s;
        }
        .setting-item .setting-input:focus {
            border-color: var(--neon-red);
            box-shadow: 0 0 12px var(--neon-glow);
            background: rgba(255,255,255,0.12);
        }
        .setting-item .setting-input::placeholder { color: rgba(255,255,255,0.3); }
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 24px;
            transition: 0.3s;
        }
        .toggle-slider::before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .toggle-switch input:checked+.toggle-slider { background: var(--neon-red); }
        .toggle-switch input:checked+.toggle-slider::before { transform: translateX(20px); }
        .color-picker-wrapper {
            position: relative;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.15);
            transition: border 0.2s;
            background: var(--neon-red);
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
        }
        .color-picker-wrapper:hover { border-color: rgba(255,255,255,0.5); }
        .color-picker-wrapper input[type="color"] {
            position: absolute;
            top: -6px;
            left: -6px;
            width: calc(100% + 12px);
            height: calc(100% + 12px);
            padding: 0;
            border: none;
            outline: none;
            cursor: pointer;
            background: transparent;
            opacity: 0;
        }

        .opacity-slider-wrap {
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .opacity-slider-wrap .label {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 500;
            flex-shrink: 0;
        }
        .opacity-slider-wrap input[type="range"] {
            flex: 1;
            min-width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            cursor: pointer;
        }
        .opacity-slider-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--neon-red);
            transform: rotate(45deg);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--neon-glow);
            cursor: pointer;
        }
        .opacity-slider-wrap input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--neon-red);
            transform: rotate(45deg);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--neon-glow);
            cursor: pointer;
            border: none;
        }

        .settings-eq-modes, .settings-effects-modes {
            padding: 16px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }
        .settings-eq-modes .eq-modes-header,
        .settings-effects-modes .effects-modes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1.5px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
        }
        .eq-mode-buttons, .effects-mode-buttons {
            display: flex;
            gap: 8px;
        }
        .eq-mode-btn, .effects-mode-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            padding: 6px 14px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: 0.2s;
            flex: 1;
            text-align: center;
        }
        .eq-mode-btn:hover, .effects-mode-btn:hover {
            background: var(--neon-dim);
            border-color: var(--neon-border);
        }

    <script>
        (function() {
            // ============================================
            // СИСТЕМА ЭФФЕКТОВ - ТОЛЬКО ОГОНЬ И ДОЖДЬ
            // ============================================

            const fireCanvas = document.getElementById('effects-fire-canvas');
            const fireCtx = fireCanvas.getContext('2d');
            const rainCanvas = document.getElementById('effects-rain-canvas');
            const rainCtx = rainCanvas.getContext('2d');

            let effectsMode = 0;
            let effectsRunning = false;
            let effectsRAF = null;
            let lastTime = 0;
            let fireParticles = [];
            let rainDrops = [];

            let effectsColor = '#ff001c';
            let effectsOpacity = 0.5;

            function resizeEffectCanvases() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                fireCanvas.width = w;
                fireCanvas.height = h;
                fireCanvas.style.width = '100vw';
                fireCanvas.style.height = '100vh';
                rainCanvas.width = w;
                rainCanvas.height = h;
                rainCanvas.style.width = '100vw';
                rainCanvas.style.height = '100vh';
            }
            resizeEffectCanvases();
            window.addEventListener('resize', resizeEffectCanvases);

            // ============ ОГОНЬ (без учёта виджетов) ============
            function initFire() {
                fireParticles = [];
                const w = fireCanvas.width;
                const h = fireCanvas.height;
                const count = 120;
                for (let i = 0; i < count; i++) {
                    fireParticles.push({
                        x: Math.random() * w,
                        y: h + Math.random() * 200,
                        size: 2 + Math.random() * 8,
                        vx: (Math.random() - 0.5) * 30,
                        vy: -(50 + Math.random() * 150),
                        life: 0.3 + Math.random() * 0.8,
                        maxLife: 0.3 + Math.random() * 0.8
                    });
                }
            }

            function updateFire(dt) {
                const w = fireCanvas.width;
                const h = fireCanvas.height;
                for (let p of fireParticles) {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 25 * dt;
                    p.life -= dt * 0.4;

                    if (p.y < -30 || p.life <= 0) {
                        p.x = Math.random() * w;
                        p.y = h + 20 + Math.random() * 100;
                        p.size = 2 + Math.random() * 8;
                        p.vx = (Math.random() - 0.5) * 30;
                        p.vy = -(50 + Math.random() * 150);
                        p.life = 0.3 + Math.random() * 0.8;
                        p.maxLife = p.life;
                    }
                }
            }

            function drawFire() {
                const w = fireCanvas.width;
                const h = fireCanvas.height;
                fireCtx.clearRect(0, 0, w, h);
                const color = effectsColor;
                for (let p of fireParticles) {
                    const alpha = (p.life / p.maxLife) * 0.7;
                    const size = p.size * (0.3 + 0.7 * (p.life / p.maxLife));
                    fireCtx.beginPath();
                    fireCtx.arc(p.x, p.y, size, 0, Math.PI * 2);
                    fireCtx.fillStyle = color;
                    fireCtx.globalAlpha = alpha;
                    fireCtx.shadowColor = color;
                    fireCtx.shadowBlur = 20;
                    fireCtx.fill();
                    fireCtx.shadowBlur = 0;
                }
                fireCtx.globalAlpha = 1;
            }

            // ============ ДОЖДЬ (без учёта виджетов) ============
            function initRain() {
                rainDrops = [];
                const w = rainCanvas.width;
                const h = rainCanvas.height;
                const count = 200;
                for (let i = 0; i < count; i++) {
                    rainDrops.push({
                        x: Math.random() * w,
                        y: -10 - Math.random() * 200,
                        speed: 100 + Math.random() * 300,
                        length: 10 + Math.random() * 30,
                        width: 0.5 + Math.random() * 2,
                        opacity: 0.2 + Math.random() * 0.5
                    });
                }
            }

            function updateRain(dt) {
                const w = rainCanvas.width;
                const h = rainCanvas.height;
                for (let d of rainDrops) {
                    d.x += d.speed * 0.05 * dt;
                    d.y += d.speed * dt;

                    if (d.y > h + 30) {
                        d.x = Math.random() * w;
                        d.y = -10 - Math.random() * 100;
                        d.speed = 100 + Math.random() * 300;
                        d.length = 10 + Math.random() * 30;
                        d.opacity = 0.2 + Math.random() * 0.5;
                    }
                    if (d.x < -50 || d.x > w + 50) {
                        d.x = Math.random() * w;
                        d.y = -10 - Math.random() * 100;
                    }
                }
            }

            function drawRain() {
                const w = rainCanvas.width;
                const h = rainCanvas.height;
                rainCtx.clearRect(0, 0, w, h);
                const color = effectsColor;
                for (let d of rainDrops) {
                    rainCtx.beginPath();
                    rainCtx.moveTo(d.x, d.y);
                    rainCtx.lineTo(d.x + d.length * 0.15, d.y + d.length);
                    rainCtx.strokeStyle = color;
                    rainCtx.globalAlpha = d.opacity * 0.6;
                    rainCtx.lineWidth = d.width;
                    rainCtx.shadowColor = color;
                    rainCtx.shadowBlur = 4;
                    rainCtx.stroke();
                    rainCtx.shadowBlur = 0;
                }
                rainCtx.globalAlpha = 1;
            }

            // ============ УПРАВЛЕНИЕ ЭФФЕКТАМИ ============
            function startEffects(mode) {
                effectsMode = mode;

                fireCanvas.classList.add('hidden');
                rainCanvas.classList.add('hidden');

                if (effectsRAF) {
                    cancelAnimationFrame(effectsRAF);
                    effectsRAF = null;
                }
                effectsRunning = false;

                if (mode === 0) return;

                if (mode === 1) {
                    fireCanvas.classList.remove('hidden');
                    initFire();
                } else if (mode === 2) {
                    rainCanvas.classList.remove('hidden');
                    initRain();
                }

                effectsRunning = true;
                lastTime = performance.now();
                animateEffects();
            }

            function animateEffects() {
                if (!effectsRunning) {
                    effectsRAF = null;
                    return;
                }

                const now = performance.now();
                const dt = Math.min(0.05, (now - lastTime) / 1000);
                lastTime = now;

                if (effectsMode === 1) {

            function makeDraggable(widgetId, moveBtn) {
                let dragging = false, offX = 0, offY = 0;
                moveBtn.addEventListener('mousedown', function(e) {
                    e.stopPropagation(); e.preventDefault();
                    if (!document.getElementById('editModeToggle').checked) return;
                    const w = widgetState[widgetId];
                    const el = widgets[widgetId];
                    const rect = el.getBoundingClientRect();
                    offX = e.clientX - rect.left;
                    offY = e.clientY - rect.top;
                    dragging = true;
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
                function onMove(e) {
                    if (!dragging) return;
                    const w = widgetState[widgetId];
                    const el = widgets[widgetId];
                    let nx = e.clientX - offX;
                    let ny = e.clientY - offY;
                    nx = Math.max(0, Math.min(nx, window.innerWidth - el.offsetWidth));
                    ny = Math.max(0, Math.min(ny, window.innerHeight - el.offsetHeight));
                    w.x = nx; w.y = ny;
                    el.style.left = nx + 'px'; el.style.top = ny + 'px';
                }
                function onUp() {
                    if (dragging) { dragging = false; scheduleSave(); }
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                }
            }

            function makeRotatable(widgetId, rotateBtn) {
                let rotating = false, startAngle = 0, startRotation = 0, total = 0, prev = 0;
                rotateBtn.addEventListener('mousedown', function(e) {
                    e.stopPropagation(); e.preventDefault();
                    if (!document.getElementById('editModeToggle').checked) return;
                    const w = widgetState[widgetId];
                    const el = widgets[widgetId];
                    const rect = el.getBoundingClientRect();
                    const cx = rect.left + rect.width/2;
                    const cy = rect.top + rect.height/2;
                    startAngle = Math.atan2(e.clientY - cy, e.clientX - cx);
                    startRotation = w.rotation;
                    total = 0; prev = startAngle;
                    rotating = true;
                    document.addEventListener('mousemove', onRotate);
                    document.addEventListener('mouseup', onRotateUp);
                });
                function onRotate(e) {
                    if (!rotating) return;
                    const w = widgetState[widgetId];
                    const el = widgets[widgetId];
                    const rect = el.getBoundingClientRect();
                    const cx = rect.left + rect.width/2;
                    const cy = rect.top + rect.height/2;
                    const cur = Math.atan2(e.clientY - cy, e.clientX - cx);
                    let delta = cur - prev;
                    if (delta > Math.PI) delta -= 2*Math.PI;
                    if (delta < -Math.PI) delta += 2*Math.PI;
                    total += delta; prev = cur;
                    w.rotation = startRotation + total*(180/Math.PI);
                    el.style.transform = `rotate(${w.rotation}deg)`;
                }
                function onRotateUp() {
                    if (rotating) {
                        rotating = false;
                        const w = widgetState[widgetId];
                        let r = Math.round(w.rotation/30)*30;
                        r = ((r%360)+360)%360;
                        w.rotation = r;
                        widgets[widgetId].style.transform = `rotate(${r}deg)`;
                        scheduleSave();
                    }
                    document.removeEventListener('mousemove', onRotate);
                    document.removeEventListener('mouseup', onRotateUp);
                }
            }

            function makeResizable(widgetId, resizeBtn) {
                let resizing = false, startX=0, startY=0, startW=0, startH=0, startScale=1, startFontScale=1;
                resizeBtn.addEventListener('mousedown', function(e) {
                    e.stopPropagation(); e.preventDefault();
                    if (!document.getElementById('editModeToggle').checked) return;
                    const w = widgetState[widgetId];
                    startX = e.clientX; startY = e.clientY;
                    startW = w.width; startH = w.height;
                    startScale = w.scale || 1;
                    startFontScale = w.fontScale || 1;
                    resizing = true;
                    document.addEventListener('mousemove', onResize);
                    document.addEventListener('mouseup', onResizeUp);
                });
                function onResize(e) {
                    if (!resizing) return;
                    const w = widgetState[widgetId];
                    const el = widgets[widgetId];
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    if (widgetId === 'settings') {
                        let nw = startW + dx, nh = startH + dy;
                        nw = Math.max(40, Math.min(nw, window.innerWidth - 20));
                        nh = Math.max(40, Math.min(nh, window.innerHeight - 20));
                        w.width = nw; w.height = nh;
                        el.style.width = nw + 'px'; el.style.height = nh + 'px';
                        const icon = el.querySelector('.btn-icon');
                        if (icon) {
                            let s = Math.min(nw, nh) * 0.58;
                            s = Math.max(16, s);
                            icon.style.width = s + 'px';
                            icon.style.height = s + 'px';
                        }
                    } else if (widgetId === 'player') {
                        let ns = startScale + dx/200;
                        ns = Math.max(0.3, Math.min(3, ns));
                        w.scale = ns;
                        scalePlayer(el, ns);
                        const rect = el.getBoundingClientRect();
                        w.width = rect.width; w.height = rect.height;
                    } else if (widgetId === 'info') {
                        let nw = startW + dx, nh = startH + dy;
                        nw = Math.max(100, Math.min(nw, window.innerWidth - 20));
                        nh = Math.max(40, Math.min(nh, window.innerHeight - 20));
                        const scaleRatio = Math.min(nw/startW, nh/startH);
                        let nfs = startFontScale * scaleRatio;
                        nfs = Math.max(0.4, Math.min(2.5, nfs));
                        w.fontScale = nfs; w.width = nw; w.height = nh;
                        el.style.width = nw + 'px'; el.style.height = nh + 'px';
                        applyInfoScale(el, nfs);
                    } else if (widgetId === 'progress') {
                        let nw = startW + dx;
                        nw = Math.max(200, Math.min(nw, window.innerWidth - 20));
                        w.width = nw; el.style.width = nw + 'px';
                    } else if (widgetId === 'volume') {
                        let nw = startW + dx;
                        nw = Math.max(120, Math.min(nw, window.innerWidth - 20));
                        w.width = nw; el.style.width = nw + 'px';
                    } else if (widgetId === 'playlist') {
                        let nw = startW + dx, nh = startH + dy;
                        nw = Math.max(160, Math.min(nw, window.innerWidth - 20));
                        nh = Math.max(150, Math.min(nh, window.innerHeight - 20));
                        const scaleRatio = Math.min(nw/startW, nh/startH);
                        let nfs = startFontScale * scaleRatio;
                        nfs = Math.max(0.4, Math.min(2.5, nfs));
                        w.fontScale = nfs; w.width = nw; w.height = nh;
                        el.style.width = nw + 'px'; el.style.height = nh + 'px';
                        applyPlaylistScale(el, nfs);
                    }
                }
                function onResizeUp() {
                    if (resizing) { resizing = false; scheduleSave(); }
                    document.removeEventListener('mousemove', onResize);
                    document.removeEventListener('mouseup', onResizeUp);
                }
            }

                const gains = configData.eq_gains || [0,0,0,0,0,0,0];
                for (let i = 0; i < eqBands.length; i++) {
                    eqBands[i].gain = gains[i] || 0;
                    const div = document.createElement('div');
                    div.className = 'eq-band';
                    const label = document.createElement('span');
                    label.textContent = freqs[i];

            function initEqualizer() {
                if (!audioCtx || !srcNode) return;
                if (eqFilters.length) {
                    eqFilters.forEach(f => f.disconnect());
                    srcNode.disconnect();
                    srcNode.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    eqFilters = [];
                }
                let prevNode = srcNode;
                const gains = configData.eq_gains || [0,0,0,0,0,0,0];
                for (let i = 0; i < eqBands.length; i++) {
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'peaking';
                    filter.frequency.value = eqBands[i].freq;
                    filter.Q.value = 1.5;
                    filter.gain.value = gains[i] || 0;
                    eqFilters.push(filter);
                    prevNode.connect(filter);
                    prevNode = filter;
                }
                prevNode.connect(analyser);
                analyser.connect(audioCtx.destination);
            }

            function resetEqualizer() {
                for (let i = 0; i < eqBands.length; i++) {
                    eqBands[i].gain = 0;
                    configData.eq_gains[i] = 0;
                    if (webaudioReady && eqFilters[i]) eqFilters[i].gain.value = 0;
                    const slider = document.getElementById(`eq-slider-${i}`);
                    if (slider) slider.value = '0';
                }
                scheduleSave();
            }
            document.getElementById('widget-eq-reset').addEventListener('click', resetEqualizer);

            function initWebAudio() {
                if (webaudioReady || !audio.src) return false;
                try {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AC();
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 512;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    srcNode = audioCtx.createMediaElementSource(audio);
                    initEqualizer();
                    webaudioReady = true;
                    if (configData.visualizer_mode !== 0) updateVisualizerVisibility();
                    return true;
                } catch (e) { return false; }
            }

            function formatTime(sec) {
                if (isNaN(sec) || sec === Infinity) return '0:00';
                const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
                return `${m}:${s.toString().padStart(2,'0')}`;
            }

            function updateTrackDisplay() {
                if (!songs.length || !songs[currentIndex]) { trackTitle.textContent = '—'; artistName.textContent = '—'; return; }
                const song = songs[currentIndex];
                const raw = song.name || song.file.replace(/\.[^/.]+$/, '');
                let artist = 'Unknown Artist', title = raw;
                if (raw.includes(' - ')) {
                    const parts = raw.split(' - ');
                    if (parts.length >= 2) { artist = parts[0].trim(); title = parts.slice(1).join(' - ').trim(); }
                }
                trackTitle.textContent = title || '—';
                artistName.textContent = artist;
            }

            function loadSong(index) {
                if (!songs.length) return;
                if (index < 0) index = songs.length - 1;
                if (index >= songs.length) index = 0;
                currentIndex = index;
                audio.src = `/music/${songs[currentIndex].file}`;
                updateTrackDisplay();
                renderPlaylist();
                progressFill.style.width = '0%';
                currentTimeSpan.textContent = '0:00';
                totalTimeSpan.textContent = audio.duration ? formatTime(audio.duration) : '0:00';
                setTimeout(() => {
                    const activeItem = plList.querySelector('.pl-item.active-song');
                    if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }, 100);
            }

            function togglePlay() {
                if (!songs.length) return;
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    customPlayBtn.classList.remove('playing');
                } else {
                    if (!webaudioReady && audio.src) initWebAudio();
                    audio.play().catch(e => {});
                    isPlaying = true;
                    customPlayBtn.classList.add('playing');
                }
            }

            function nextTrack() {
                if (!songs.length) return;
                if (isShuffle && songs.length > 1) {
                    let ni; do { ni = Math.floor(Math.random() * songs.length); } while (ni === currentIndex);
                    loadSong(ni);
                } else loadSong(currentIndex + 1);
                if (!isPlaying) togglePlay(); else audio.play().catch(e => {});
            }

            function prevTrack() {
                if (!songs.length) return;
                if (audio.currentTime > 3) { audio.currentTime = 0; updateProgress(); }
                else {
                    if (isShuffle && songs.length > 1) {
                        let ni; do { ni = Math.floor(Math.random() * songs.length); } while (ni === currentIndex);
                        loadSong(ni);
                    } else loadSong(currentIndex - 1);
                    if (!isPlaying) togglePlay(); else audio.play().catch(e => {});
                }
            }

            function toggleShuffle() {
                isShuffle = !isShuffle;
                shuffleBtn.style.color = isShuffle ? 'var(--neon-red)' : 'rgba(255,255,255,0.6)';
            }

            function toggleRepeat() {
                isRepeat = !isRepeat;
                repeatBtn.style.color = isRepeat ? 'var(--neon-red)' : 'rgba(255,255,255,0.6)';
            }

            function updateProgress() {
                if (!isSeeking && audio.duration && !isNaN(audio.duration)) {
                    progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
                    currentTimeSpan.textContent = formatTime(audio.currentTime);
                    totalTimeSpan.textContent = formatTime(audio.duration);
                }
            }

            function seek(e) {
                if (!audio.duration) return;
                const rect = progressTrack.getBoundingClientRect();
                let pct = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
                isSeeking = true;
                audio.currentTime = pct * audio.duration;
                progressFill.style.width = (pct * 100) + '%';
                setTimeout(() => { isSeeking = false; }, 100);
            }

            function setVolume(val) {
                const percent = parseFloat(val) / 100;
                audio.volume = Math.min(1, Math.max(0, Math.pow(percent, 1.8)));
                if (audio.volume === 0) customVolBtn.classList.add('muted');
                else customVolBtn.classList.remove('muted');
            }

            function toggleMute() {
                if (audio.volume > 0) {
                    audio.dataset.prevVol = audio.volume;
                    audio.volume = 0; volSlider.value = 0; setVolume(0);
                    customVolBtn.classList.add('muted');
                } else {
                    let prev = parseFloat(audio.dataset.prevVol) || 0.7;
                    audio.volume = prev;
                    volSlider.value = Math.min(100, Math.max(0, Math.round(Math.pow(prev, 1/1.8) * 100)));
                    setVolume(volSlider.value);
                    customVolBtn.classList.remove('muted');
                }
            }

            function renderPlaylist() {
                const display = filteredSongs.length ? filteredSongs : songs;
                if (!display.length) {
                    plList.innerHTML = '<div style="padding:8px;color:rgba(255,255,255,0.4);text-align:center;">Нет треков</div>';
                    return;
                }
                plList.innerHTML = display.map((s, i) => {
                    const raw = s.name || s.file.replace(/\.[^/.]+$/, '');
                    const origIdx = songs.findIndex(o => o.file === s.file);
                    return `<div class="pl-item" data-index="${origIdx}">
                        <span class="pl-num">${(i+1).toString().padStart(2,'0')}</span>
                        <span class="pl-name">${raw}</span>
                        <button class="pl-dl" data-file="${s.file}" data-name="${raw}"><i class="fa-solid fa-download"></i></button>
                    </div>`;
                }).join('');
                document.querySelectorAll('.pl-item').forEach(el => {
                    const idx = parseInt(el.dataset.index);
                    el.addEventListener('click', (e) => {
                        if (e.target.closest('.pl-dl')) return;
                        loadSong(idx);
                        if (!isPlaying) togglePlay(); else audio.play().catch(e => {});
                    });
                    if (idx === currentIndex) el.classList.add('active-song');
                });
                document.querySelectorAll('.pl-dl').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const a = document.createElement('a');
                        a.href = `/music/${btn.dataset.file}`;
                        a.download = btn.dataset.name || btn.dataset.file;
                        document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    });
                });
                const fs = widgetState.playlist.fontScale || 1;
                applyPlaylistScale(plList.parentElement, fs);
            }

            function filterSongs() {
                const q = searchQuery.trim().toLowerCase();
                filteredSongs = q ? songs.filter(s => (s.name || s.file.replace(/\.[^/.]+$/, '')).toLowerCase().includes(q)) : [...songs];
                renderPlaylist();
            }

            async function fetchSongs() {
                try {
                    const res = await fetch('/api/music-list');
                    if (!res.ok) throw new Error();
                    songs = (await res.json()) || [];
                    filteredSongs = [...songs];
                    if (songs.length) loadSong(0);
                    renderPlaylist();
                    renderEqSliders();
                } catch (err) {
                    plList.innerHTML = '<div style="padding:8px;color:rgba(255,0,0,0.6);">❌ Ошибка загрузки</div>';
                    renderEqSliders();
                }
            }

            function drawVisualizer() {
                if (!webaudioReady || !analyser || configData.visualizer_mode === 0) {
                    ctx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
                    return;
                }
                analyser.getByteFrequencyData(dataArray);
                const w = visualizerCanvas.width;
                const h = visualizerCanvas.height;
                ctx.clearRect(0, 0, w, h);

                const step = 4;
                const count = Math.floor(dataArray.length / step);
                const barWidth = (w / count) * 0.9;
                const half = h / 2;
                const color = getComputedStyle(document.documentElement).getPropertyValue('--neon-red').trim() || '#ff001c';

                const mode = configData.visualizer_mode || 0;
                if (mode === 1) {
                    for (let i = 0; i < count; i++) {
                        const val = dataArray[i * step] / 255;
                        const barHeight = val * half;
                        const x = i * (barWidth + 1);
                        ctx.fillStyle = color;
                        ctx.fillRect(x, half - barHeight, barWidth, barHeight);
                        ctx.fillRect(x, half, barWidth, barHeight);
                    }
                } else if (mode === 2) {
                    for (let i = 0; i < count; i++) {
                        const val = dataArray[i * step] / 255;
                        const barHeight = val * h;
                        const x = i * (barWidth + 1);
                        ctx.fillStyle = color;
                        ctx.fillRect(x, h - barHeight, barWidth, barHeight);
                    }
                } else if (mode === 3) {
                    const cx = w / 2;
                    const cy = h / 2;
                    const radius = Math.min(w, h) * 0.35;
                    const angleStep = (Math.PI * 2) / count;
                    ctx.beginPath();
                    for (let i = 0; i < count; i++) {
                        const val = dataArray[i * step] / 255;
                        const r = radius + val * radius * 0.6;
                        const angle = i * angleStep;
                        const x = cx + Math.cos(angle) * r;
                        const y = cy + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            }

            function animateVisualizer() {
                drawVisualizer();
                animFrameId = requestAnimationFrame(animateVisualizer);
            }

            function ensureVisualizer() {
                if (webaudioReady && configData.visualizer_mode !== 0) {
                    if (animFrameId) cancelAnimationFrame(animFrameId);
                    animateVisualizer();
                }
            }

            // --- Event listeners ---
            customPlayBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePlay();
            });
            customVolBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMute();
            });
            prevBtn.addEventListener('click', prevTrack);
            nextBtn.addEventListener('click', nextTrack);
            shuffleBtn.addEventListener('click', toggleShuffle);
            repeatBtn.addEventListener('click', toggleRepeat);
            progressTrack.addEventListener('click', seek);
            volSlider.addEventListener('input', (e) => setVolume(e.target.value));
            volSlider.addEventListener('change', (e) => {
                if (audio.volume === 0) customVolBtn.classList.add('muted');
                else customVolBtn.classList.remove('muted');
            });
            searchInput.addEventListener('input', (e) => { searchQuery = e.target.value; filterSongs(); });
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('ended', () => {
                customPlayBtn.classList.remove('playing');
                if (isRepeat) { audio.currentTime = 0; audio.play().catch(e => {}); customPlayBtn.classList.add('playing'); }
                else nextTrack();
            });
            audio.addEventListener('loadedmetadata', () => { totalTimeSpan.textContent = formatTime(audio.duration); });
            document.body.addEventListener('click', () => {
                if (!webaudioReady && audio.src) {
                    const ok = initWebAudio();
                    if (ok) ensureVisualizer();
                }
            }, { once: true });

            // --- Init ---
            async function init() {
                await loadConfigFromServer();

                setAccentColor(configData.accent_color || '#ff001c');

                if (configData.site_title) {
                    document.title = configData.site_title;
                    document.getElementById('siteTitleInput').value = configData.site_title;
                }

                const editMode = configData.edit_mode || false;
                document.getElementById('editModeToggle').checked = editMode;
                document.querySelectorAll('.widget-wrapper').forEach(el => {
                    if (editMode) el.classList.add('edit-mode');
                    else el.classList.remove('edit-mode');
                });

                const opacity = configData.visualizer_opacity || 30;
                document.getElementById('visualizerOpacity').value = opacity;
                document.documentElement.style.setProperty('--visualizer-opacity', opacity/100);

                const plVisible = configData.playlist_visible !== false;
                document.getElementById('playlistToggle').checked = plVisible;
                const plWidget = document.getElementById('playlist-widget');
                if (plWidget) {
                    if (!plVisible) plWidget.classList.add('hidden');
                    else plWidget.classList.remove('hidden');
                }

                visualizerMode = configData.visualizer_mode || 0;
                updateVisualizerVisibility();

                if (configData.eq_gains) {
                    for (let i = 0; i < Math.min(configData.eq_gains.length, eqBands.length); i++) {
                        eqBands[i].gain = configData.eq_gains[i] || 0;
                    }
                }

                if (configData.widgets) {
                    for (const id of widgetIds) {
                        if (configData.widgets[id]) widgetState[id] = configData.widgets[id];
                    }
                }
                updateAllWidgets();

                for (const id of widgetIds) initWidgetControls(id);

                fetchSongs();
                renderEqSliders();

                setVolume(volSlider.value);
                if (audio.volume === 0) customVolBtn.classList.add('muted');
                else customVolBtn.classList.remove('muted');

                updateEffectsSettings();

                const effOpacity = (configData.effects_opacity || 50) / 100;
                fireCanvas.style.opacity = effOpacity;
                rainCanvas.style.opacity = effOpacity;

                setTimeout(() => {
                    if (webaudioReady && configData.visualizer_mode !== 0) ensureVisualizer();
                }, 1000);
            }

            scheduleSave = function() {
                if (saveTimeout) clearTimeout(saveTimeout);
                saveTimeout = setTimeout(saveConfigToServer, 300);
            };

            init();
        })();
    </script>
</body>
</html>
